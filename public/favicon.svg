<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>RadioMini</title>
  <defs>
    <!-- Warm background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF9F43"/>
      <stop offset="100%" stop-color="#E8651A"/>
    </linearGradient>
    <!-- Glossy overlay -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.40"/>
      <stop offset="42%" stop-color="#fff" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.10"/>
    </linearGradient>
    <!-- Radio body gradient -->
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#e0ddd8"/>
    </linearGradient>
    <!-- Speaker face -->
    <radialGradient id="spk" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#d5d0cb"/>
    </radialGradient>
    <clipPath id="clip"><rect width="64" height="64" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="64" height="64" fill="url(#bg)"/>

    <!-- ===== RADIO BODY ===== -->
    <rect x="8" y="18" width="48" height="38" rx="6" fill="url(#body)"/>
    <!-- Inset shadow on body -->
    <rect x="8" y="18" width="48" height="38" rx="6" fill="none" stroke="#c8c0b8" stroke-width="0.8"/>
    <!-- Top edge highlight -->
    <rect x="9" y="18.5" width="46" height="37" rx="5.5" fill="none" stroke="#fff" stroke-width="0.6" opacity="0.7"/>

    <!-- ===== ANTENNA ===== -->
    <line x1="20" y1="7" x2="20" y2="22" stroke="#d0ccc6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="7" x2="20" y2="22" stroke="#fff" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
    <!-- Antenna tip -->
    <circle cx="20" cy="6" r="2.5" fill="#FF6B35"/>
    <circle cx="20" cy="6" r="1.5" fill="#FFB84D"/>
    <circle cx="19.3" cy="5.2" r="0.6" fill="#fff" opacity="0.6"/>

    <!-- ===== RADIO WAVES ===== -->
    <g stroke-linecap="round" fill="none" stroke="#fff">
      <path d="M 25 3.5 A 6 6 0 0 1 25 8.5" stroke-width="1.6" opacity="0.7"/>
      <path d="M 28.5 1.5 A 9 9 0 0 1 28.5 10.5" stroke-width="1.4" opacity="0.45"/>
    </g>

    <!-- ===== CLICK WHEEL ===== -->
    <!-- Outer wheel surface -->
    <circle cx="27" cy="37" r="12" fill="url(#spk)"/>
    <circle cx="27" cy="37" r="12" fill="none" stroke="#c0b8b0" stroke-width="0.7"/>
    <!-- Center button -->
    <circle cx="27" cy="37" r="4.2" fill="#e8e4df"/>
    <circle cx="27" cy="37" r="4.2" fill="none" stroke="#c0b8b0" stroke-width="0.6"/>
    <ellipse cx="26" cy="35.8" rx="1.8" ry="1" fill="#fff" opacity="0.18"/>

    <!-- ===== DISPLAY / TUNING BAR ===== -->
    <rect x="42" y="25" width="7" height="24" rx="2.5" fill="#e8e4df" stroke="#c8c0b8" stroke-width="0.6"/>
    <!-- Dial lines -->
    <line x1="43.5" y1="29" x2="47.5" y2="29" stroke="#c0b8b0" stroke-width="0.5"/>
    <line x1="43.5" y1="32" x2="47.5" y2="32" stroke="#c0b8b0" stroke-width="0.5"/>
    <line x1="43.5" y1="35" x2="47.5" y2="35" stroke="#c0b8b0" stroke-width="0.5"/>
    <line x1="43.5" y1="38" x2="47.5" y2="38" stroke="#c0b8b0" stroke-width="0.5"/>
    <line x1="43.5" y1="41" x2="47.5" y2="41" stroke="#c0b8b0" stroke-width="0.5"/>
    <line x1="43.5" y1="44" x2="47.5" y2="44" stroke="#c0b8b0" stroke-width="0.5"/>

    <!-- ===== iOS 6 GLOSS ===== -->
    <rect width="64" height="64" fill="url(#gloss)"/>
    <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" fill="none" stroke="#fff" stroke-opacity="0.15"/>
  </g>
</svg>
